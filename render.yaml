services:
  - type: web
    name: glairai-chat
    runtime: node
    region: oregon
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@10.32.1 --activate && pnpm install && pnpm --filter @workspace/api-server build
    startCommand: pnpm --filter @workspace/api-server start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: OTP_DEMO_CODE_ENABLED
        value: "false"
      # Activer quand Africa's Talking est configuré :
      # OTP_SMS_ENABLED=true, AFRICAS_TALKING_API_KEY, AFRICAS_TALKING_USERNAME
      # LIVEKIT_URL, LIVEKIT_API_KEY, LIVEKIT_API_SECRET
